<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전시·행사 트래커 — COEX · SETEC · KINTEX · DDP</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // 다크모드 깜빡임 방지 — 렌더 전에 테마 결정
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var dark = saved
          ? saved === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="다크모드 전환">🌙</button>
    <div class="header-inner">
      <h1>전시 Tracker</h1>
      <p class="subtitle">COEX · SETEC · KINTEX · DDP 전시장 일정을 한곳에서</p>
      <p class="updated" id="updated"></p>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="search-box">
        <input
          type="search"
          id="search"
          placeholder="행사명 · 장소 검색"
          autocomplete="off"
        />
      </div>

      <div class="filter-group" id="source-filters" aria-label="출처 필터">
        <!-- 출처 칩 동적 생성 -->
      </div>

      <div class="filter-group" id="status-filters" aria-label="상태 필터">
        <button class="chip" data-status="all" data-active="true">전체</button>
        <button class="chip" data-status="ongoing">진행중</button>
        <button class="chip" data-status="upcoming">예정</button>
        <button class="chip" data-status="ended">종료</button>
      </div>

      <label class="toggle">
        <input type="checkbox" id="relevant-only" checked />
        <span>관련 주제만</span>
      </label>
    </div>
  </div>

  <main>
    <div class="view-bar">
      <div class="view-switch" id="view-switch">
        <button class="view-btn" type="button" data-view="gallery" data-active="true">🗂 갤러리</button>
        <button class="view-btn" type="button" data-view="calendar">📅 캘린더</button>
      </div>
      <p class="result-count" id="result-count"></p>
    </div>

    <section class="gallery" id="gallery" aria-live="polite"></section>
    <p class="empty" id="empty" hidden>조건에 맞는 행사가 없습니다.</p>

    <section class="calendar" id="calendar" hidden>
      <div class="cal-nav">
        <button class="cal-arrow" id="cal-prev" type="button" aria-label="이전 달">◀</button>
        <span class="cal-label" id="cal-label"></span>
        <button class="cal-arrow" id="cal-next" type="button" aria-label="다음 달">▶</button>
        <button class="cal-today" id="cal-today" type="button">오늘</button>
      </div>
      <div class="cal-scroll">
        <div class="cal-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>크롤링 데이터 · 출처 사이트의 일정을 자동 수집합니다.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
